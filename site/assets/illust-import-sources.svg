  <!-- Import source cards arranged in arc -->
  <!-- ChatGPT -->
  <rect x="50" y="60" width="72" height="32" rx="6" fill="#0f1225" stroke="#d4a843" stroke-opacity="0.5" stroke-width="1"/>
  <text x="86" y="80" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" font-weight="600" fill="#d4a843">ChatGPT</text>
