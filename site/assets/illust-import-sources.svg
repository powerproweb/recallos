<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 345" fill="none">
  <defs>
    <radialGradient id="is-glow" cx="50%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#d4a843" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#080c1a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="460" height="345" rx="14" fill="#0f1225"/>
  <rect width="460" height="345" rx="14" fill="url(#is-glow)"/>

  <!-- Central RecallOS hub -->
  <circle cx="230" cy="172" r="38" stroke="#2ec4b6" stroke-width="2" fill="#2ec4b6" fill-opacity="0.08"/>
