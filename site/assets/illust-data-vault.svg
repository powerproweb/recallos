<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 345" fill="none">
  <defs>
    <radialGradient id="dv-glow" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#2ec4b6" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#080c1a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="dv-gold-line" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4a843" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#d4a843" stop-opacity="0.1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="460" height="345" rx="14" fill="#0f1225"/>
  <rect width="460" height="345" rx="14" fill="url(#dv-glow)"/>

  <!-- Central domain hexagon -->
  <polygon points="230,80 280,109 280,167 230,196 180,167 180,109" stroke="#2ec4b6" stroke-width="2" fill="#2ec4b6" fill-opacity="0.08"/>
  <text x="230" y="144" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="700" fill="#2ec4b6">DOMAIN</text>

  <!-- Node hexagons -->
  <polygon points="120,190 155,210 155,250 120,270 85,250 85,210" stroke="#d4a843" stroke-width="1.5" fill="#d4a843" fill-opacity="0.06"/>
  <text x="120" y="244" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" font-weight="600" fill="#d4a843">Node A</text>

  <polygon points="230,220 265,240 265,280 230,300 195,280 195,240" stroke="#d4a843" stroke-width="1.5" fill="#d4a843" fill-opacity="0.06"/>
  <text x="230" y="274" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" font-weight="600" fill="#d4a843">Node B</text>

  <polygon points="340,190 375,210 375,250 340,270 305,250 305,210" stroke="#d4a843" stroke-width="1.5" fill="#d4a843" fill-opacity="0.06"/>
  <text x="340" y="244" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" font-weight="600" fill="#d4a843">Node C</text>

  <!-- Connection lines -->
  <line x1="200" y1="178" x2="140" y2="205" stroke="url(#dv-gold-line)" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="230" y1="196" x2="230" y2="222" stroke="url(#dv-gold-line)" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="260" y1="178" x2="320" y2="205" stroke="url(#dv-gold-line)" stroke-width="1.5" stroke-dasharray="4 3"/>

  <!-- Channel indicators -->
  <rect x="55" y="130" width="55" height="18" rx="4" fill="#2ec4b6" fill-opacity="0.1" stroke="#2ec4b6" stroke-opacity="0.3" stroke-width="0.8"/>
  <text x="82" y="143" text-anchor="middle" font-family="Inter,sans-serif" font-size="7" fill="#2ec4b6" fill-opacity="0.7">facts</text>

  <rect x="370" y="130" width="55" height="18" rx="4" fill="#2ec4b6" fill-opacity="0.1" stroke="#2ec4b6" stroke-opacity="0.3" stroke-width="0.8"/>
  <text x="397" y="143" text-anchor="middle" font-family="Inter,sans-serif" font-size="7" fill="#2ec4b6" fill-opacity="0.7">events</text>

  <rect x="55" y="155" width="55" height="18" rx="4" fill="#d4a843" fill-opacity="0.1" stroke="#d4a843" stroke-opacity="0.3" stroke-width="0.8"/>
  <text x="82" y="168" text-anchor="middle" font-family="Inter,sans-serif" font-size="7" fill="#d4a843" fill-opacity="0.7">prefs</text>

  <rect x="370" y="155" width="55" height="18" rx="4" fill="#d4a843" fill-opacity="0.1" stroke="#d4a843" stroke-opacity="0.3" stroke-width="0.8"/>
  <text x="397" y="168" text-anchor="middle" font-family="Inter,sans-serif" font-size="7" fill="#d4a843" fill-opacity="0.7">guidance</text>

  <!-- Cross-domain link line -->
  <line x1="120" y1="270" x2="230" y2="300" stroke="#2ec4b6" stroke-width="1" stroke-opacity="0.35" stroke-dasharray="2 2"/>
  <line x1="340" y1="270" x2="230" y2="300" stroke="#2ec4b6" stroke-width="1" stroke-opacity="0.35" stroke-dasharray="2 2"/>

  <!-- Small dot accents -->
  <circle cx="230" cy="196" r="3" fill="#2ec4b6"/>
  <circle cx="120" cy="270" r="2.5" fill="#d4a843"/>
  <circle cx="340" cy="270" r="2.5" fill="#d4a843"/>
  <circle cx="230" cy="300" r="2.5" fill="#d4a843"/>

  <!-- Title -->
  <text x="230" y="55" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" font-weight="600" fill="#a8a4a0" letter-spacing="0.1em">DATA VAULT STRUCTURE</text>
  <line x1="155" y1="62" x2="305" y2="62" stroke="#d4a843" stroke-opacity="0.25" stroke-width="0.8"/>
</svg>
