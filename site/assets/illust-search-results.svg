<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 345" fill="none">
  <defs>
    <radialGradient id="sr-glow" cx="50%" cy="40%" r="45%">
      <stop offset="0%" stop-color="#d4a843" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#080c1a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="460" height="345" rx="14" fill="#0f1225"/>
  <rect width="460" height="345" rx="14" fill="url(#sr-glow)"/>

  <!-- Title -->
  <text x="230" y="35" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" font-weight="600" fill="#a8a4a0" letter-spacing="0.1em">SEMANTIC RETRIEVAL</text>
  <line x1="158" y1="42" x2="302" y2="42" stroke="#d4a843" stroke-opacity="0.25" stroke-width="0.8"/>

  <!-- Search bar -->
  <rect x="60" y="60" width="340" height="38" rx="10" fill="#080c1a" stroke="#2ec4b6" stroke-opacity="0.4" stroke-width="1.2"/>
  <!-- Magnifying glass icon -->
  <circle cx="82" cy="79" r="8" stroke="#2ec4b6" stroke-opacity="0.6" stroke-width="1.5" fill="none"/>
  <line x1="88" y1="85" x2="94" y2="91" stroke="#2ec4b6" stroke-opacity="0.6" stroke-width="1.5" stroke-linecap="round"/>
  <text x="105" y="83" font-family="Inter,sans-serif" font-size="10" fill="#f0ede8" font-style="italic">"Why did we switch databases?"</text>

  <!-- Result card 1 (highlighted/primary) -->
  <rect x="60" y="112" width="340" height="68" rx="10" fill="#0f1225" stroke="#d4a843" stroke-opacity="0.4" stroke-width="1.2"/>
  <circle cx="80" cy="130" r="4" fill="#2ec4b6"/>
  <text x="92" y="133" font-family="Inter,sans-serif" font-size="8" font-weight="600" fill="#d4a843">orion / backend / decisions</text>
  <text x="320" y="133" font-family="JetBrains Mono,monospace" font-size="7" fill="#6b6662">Nov 15, 2025</text>
  <text x="80" y="152" font-family="Inter,sans-serif" font-size="9" fill="#f0ede8">"Switched to Postgres because REST API versioning</text>
  <text x="80" y="166" font-family="Inter,sans-serif" font-size="9" fill="#f0ede8">was becoming unmaintainable."</text>
  <rect x="325" y="155" width="60" height="16" rx="4" fill="#2ec4b6" fill-opacity="0.1" stroke="#2ec4b6" stroke-opacity="0.3" stroke-width="0.6"/>
  <text x="355" y="166" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="7" fill="#2ec4b6">98.2%</text>

  <!-- Result card 2 -->
  <rect x="60" y="192" width="340" height="52" rx="10" fill="#0f1225" stroke="#6b6662" stroke-opacity="0.2" stroke-width="0.8"/>
  <circle cx="80" cy="210" r="3" fill="#d4a843" fill-opacity="0.5"/>
  <text x="92" y="213" font-family="Inter,sans-serif" font-size="8" font-weight="600" fill="#a8a4a0">orion / infrastructure / events</text>
  <text x="320" y="213" font-family="JetBrains Mono,monospace" font-size="7" fill="#6b6662">Nov 22, 2025</text>
  <text x="80" y="232" font-family="Inter,sans-serif" font-size="9" fill="#a8a4a0">"Migration to Postgres completed. All tests passing."</text>

  <!-- Result card 3 -->
  <rect x="60" y="256" width="340" height="52" rx="10" fill="#0f1225" stroke="#6b6662" stroke-opacity="0.15" stroke-width="0.8"/>
  <circle cx="80" cy="274" r="3" fill="#d4a843" fill-opacity="0.3"/>
  <text x="92" y="277" font-family="Inter,sans-serif" font-size="8" font-weight="600" fill="#6b6662">nova / backend / decisions</text>
  <text x="320" y="277" font-family="JetBrains Mono,monospace" font-size="7" fill="#6b6662">Dec 03, 2025</text>
  <text x="80" y="296" font-family="Inter,sans-serif" font-size="9" fill="#6b6662">"Keeping SQLite here — dataset stays under 1GB."</text>

  <!-- Bottom note -->
  <text x="230" y="330" text-anchor="middle" font-family="Inter,sans-serif" font-size="8" fill="#6b6662" font-style="italic">Original words preserved — never summarized away</text>
</svg>
